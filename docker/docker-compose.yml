# ============================================================
# docker-compose.yml - AI竞品追踪系统完整部署
# 服务: frontend / backend / celery-worker / celery-beat / redis / nginx
# ============================================================

version: "3.9"

services:
  # === Vue3 前端 ===
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: tracker-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # === FastAPI 后端 ===
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: tracker-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
      - backend-backups:/app/backups
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # === Celery 工作节点（爬虫任务执行） ===
  celery-worker:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: tracker-celery
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=3
      --max-tasks-per-child=100
      --time-limit=300
      --soft-time-limit=240
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tracker-net

  # === Celery Beat（定时调度器） ===
  celery-beat:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: tracker-beat
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - APP_ENV=production
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --schedule=/app/data/celerybeat-schedule
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tracker-net

  # === Redis ===
  redis:
    image: redis:8.0-alpine
    container_name: tracker-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - tracker-net

  # === Nginx 反向代理（统一入口） ===
  nginx:
    image: nginx:1.27-alpine
    container_name: tracker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - tracker-net

# === 持久化卷 ===
volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local
  backend-backups:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local

# === 网络 ===
networks:
  tracker-net:
    driver: bridge
