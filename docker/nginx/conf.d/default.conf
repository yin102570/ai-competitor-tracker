# ============================================================
# Nginx 站点配置 - API反向代理
# 上游: FastAPI backend (container: tracker-backend:8000)
# ============================================================

upstream backend {
    server backend:8000;
    keepalive 32;
}

# === HTTP → HTTPS 重定向 ===
server {
    listen 80;
    server_name _;

    # 健康检查端点不走HTTPS
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # 其他请求重定向到HTTPS（生产环境启用）
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # 开发/测试环境直接代理
    location / {
        proxy_pass http://backend;
    }
}

