# ============================================================
# Python 日志配置
# 结构: 控制台(彩色) + 文件(轮转)
# ============================================================

[loggers]
keys=root,app,sqlalchemy,celery,uvicorn

[handlers]
keys=console,file

[formatters]
keys=console_fmt,file_fmt

[logger_root]
level=WARNING
handlers=console,file

[logger_app]
level=INFO
handlers=console,file
qualname=app
propagate=0

[logger_sqlalchemy]
level=WARNING
handlers=console,file
qualname=sqlalchemy.engine
propagate=0

[logger_celery]
level=INFO
handlers=console,file
qualname=celery
propagate=0

[logger_uvicorn]
level=INFO
handlers=console,file
qualname=uvicorn
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=console_fmt
stream=ext://sys.stdout

[handler_file]
class=logging.handlers.RotatingFileHandler
level=DEBUG
formatter=file_fmt
args=('logs/app.log', 'a', 10485760, 5, 'utf-8')
encoding=utf-8

[formatter_console_fmt]
format=%(asctime)s | %(levelname)-8s | %(name)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_file_fmt]
format=%(asctime)s | %(levelname)-8s | %(name)s | %(funcName)s:%(lineno)d | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
